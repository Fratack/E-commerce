        // ============================================
        // MAIN APP COMPONENT
        // ============================================
        function App() {
            // State
            const [currentPage, setCurrentPage] = React.useState('home');
            const [selectedProductId, setSelectedProductId] = React.useState(null);
            const [cart, setCart] = React.useState([]);
            const [wishlist, setWishlist] = React.useState([]);
            const [mobileMenuOpen, setMobileMenuOpen] = React.useState(false);

            // Prodotti e nav dal server
            const [allProducts, setAllProducts] = React.useState([]);
            const [navItems, setNavItems] = React.useState(defaultNavItems);
            const [loading, setLoading] = React.useState(true);
            const [isAdmin, setIsAdmin] = React.useState(false);

            // Carica dati dal server all'avvio
            React.useEffect(() => {
                Promise.all([api.getProducts(), api.getNav()])
                    .then(([prods, nav]) => {
                        setAllProducts(prods || []);
                        if (nav) setNavItems(nav);
                    })
                    .catch(() => {})
                    .finally(() => setLoading(false));
            }, []);

            const reloadProducts = () => api.getProducts().then(prods => setAllProducts(prods || []));

            const saveNavItems = (updated) => {
                setNavItems(updated);
                api.saveNav(updated);
            };

            // Admin: salva prodotto (nuovo o modifica)
            const handleSaveProduct = (product) => {
                const isEdit = allProducts.some(p => p.id === product.id);
                api.saveProduct(product, isEdit).then(reloadProducts);
            };

            // Admin: elimina prodotto
            const handleDeleteProduct = (id) => {
                api.deleteProduct(id).then(reloadProducts);
            };

            // Navigate to product detail
            const goToProduct = (productId) => {
                setSelectedProductId(productId);
                setCurrentPage('product-detail');
                window.scrollTo(0, 0);
            };

            // Cart functions
            const addToCart = (product) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) {
                        return prev.map(item =>
                            item.id === product.id ? {...item, quantity: item.quantity + 1} : item
                        );
                    }
                    return [...prev, {...product, quantity: 1}];
                });
            };

            const updateCartQuantity = (id, quantity) => {
                if (quantity <= 0) {
                    setCart(prev => prev.filter(item => item.id !== id));
                } else {
                    setCart(prev => prev.map(item =>
                        item.id === id ? {...item, quantity} : item
                    ));
                }
            };

            const removeFromCart = (id) => {
                setCart(prev => prev.filter(item => item.id !== id));
            };

            const clearCart = () => {
                if (confirm('Sei sicuro di voler svuotare il carrello?')) {
                    setCart([]);
                }
            };

            // Wishlist functions
            const toggleWishlist = (id) => {
                setWishlist(prev =>
                    prev.includes(id) ? prev.filter(item => item !== id) : [...prev, id]
                );
            };

            // Render pages
            const renderPage = () => {
                switch(currentPage) {
                    case 'admin-login':
                        return <AdminLogin onLogin={(success) => { if(success) { setIsAdmin(true); setCurrentPage('admin'); } }} />;
                    case 'admin':
                        if (!isAdmin) return <AdminLogin onLogin={(success) => { if(success) { setIsAdmin(true); setCurrentPage('admin'); } }} />;
                        return (
                            <AdminPanel
                                onLogout={() => { setIsAdmin(false); setCurrentPage('home'); }}
                                allProducts={allProducts}
                                onSaveProduct={handleSaveProduct}
                                onDeleteProduct={handleDeleteProduct}
                                navItems={navItems}
                                onSaveNavItems={saveNavItems}
                            />
                        );
                    case 'product-detail':
                        const selectedProduct = allProducts.find(p => p.id === selectedProductId);
                        if (!selectedProduct) return null;
                        return (
                            <ProductDetail
                                product={selectedProduct}
                                onAddToCart={addToCart}
                                onToggleWishlist={toggleWishlist}
                                isWishlisted={wishlist.includes(selectedProductId)}
                                onBack={() => setCurrentPage('products')}
                            />
                        );
                    case 'cart':
                        return (
                            <CartPage 
                                cart={cart}
                                onUpdateQuantity={updateCartQuantity}
                                onRemove={removeFromCart}
                                onClearCart={clearCart}
                                onCheckout={() => setCurrentPage('products')}
                            />
                        );
                    case 'wishlist':
                        return (
                            <WishlistPage
                                wishlist={wishlist}
                                products={allProducts}
                                onAddToCart={addToCart}
                                onToggleWishlist={toggleWishlist}
                                onViewProduct={goToProduct}
                            />
                        );
                    case 'info':
                        return <InfoPage />;
                    case 'products':
                        return (
                            <div className="page active">
                                <div className="container">
                                    <div className="page-header">
                                        <h1 className="page-title">🛍️ Tutti i Prodotti</h1>
                                        <p className="page-subtitle">{allProducts.length} prodotti disponibili</p>
                                    </div>
                                    <div className="products-section">
                                        <div className="products-header">
                                            <h2 className="products-title">I Nostri Prodotti</h2>
                                        </div>
                                        <ProductGrid
                                            products={allProducts}
                                            onAddToCart={addToCart}
                                            onToggleWishlist={toggleWishlist}
                                            wishlist={wishlist}
                                            onViewProduct={goToProduct}
                                        />
                                    </div>
                                </div>
                            </div>
                        );
                    default: // home
                        return (
                            <div className="page active">
                                {/* Chi siamo */}
                                <section className="story-section">
                                    <div className="container">
                                        <div style={{maxWidth:'720px', margin:'0 auto'}}>
                                            <h1 className="hero-title" style={{marginBottom:'16px', fontSize:'clamp(1.6rem, 4vw, 3rem)'}}>
                                                Benvenuto in AITYCONS.<br/><span style={{fontSize:'80%'}}>Grazie di essere qui.</span>
                                            </h1>
                                            <p style={{fontSize:'1.1rem', color:'var(--accent-cyan)', fontStyle:'italic', lineHeight:'1.8', opacity:0.9, marginBottom:'40px'}}>
                                                Prima di scegliere i tuoi prodotti e completare l'acquisto<br/>scopri la nostra vision: è il cuore del valore che stai per portare a casa.
                                            </p>
                                            <div className="story-label">Vision</div>
                                            <h2 className="story-title">Un progettista appassionato,<br/>non una fabbrica</h2>
                                            <p className="story-text">
                                                Sono un progettista meccanico ed elettronico con la passione per la stampa 3D e per le moto. Ogni accessorio che trovi qui è nato da un problema reale che ho incontrato in sella alla mia Ténéré 700: ho disegnato la soluzione, l'ho stampata, testata e migliorata finché non era esattamente come la volevo.
                                            </p>
                                            <p className="story-text">
                                                Ogni prodotto nasce da un'idea, viene modellato in CAD, testato sul campo e stampato in 3D con materiali tecnici di alta qualità. Non produciamo in serie: ogni pezzo è pensato, realizzato e controllato a mano.
                                            </p>
                                            <p className="story-text">
                                                Non ho magazzini pieni di pezzi identici. Ogni ordine viene prodotto appositamente per te, con il materiale giusto e le tolleranze corrette. Per questo motivo gli ordini avvengono via WhatsApp: voglio capire esattamente cosa ti serve e assicurarmi che il prodotto faccia al caso tuo.
                                            </p>
                                        </div>
                                    </div>
                                </section>

                                {/* Come funziona */}
                                <section className="how-section" id="come-funziona">
                                    <div className="container">
                                        <div className="how-header">
                                            <div className="how-label">Processo d'acquisto</div>
                                            <h2 className="how-title">Come funziona l'ordine</h2>
                                        </div>
                                        <div className="how-steps">
                                            <div className="how-step">
                                                <div className="how-step-number">1</div>
                                                <div className="how-step-title">Scegli il prodotto</div>
                                                <div className="how-step-desc">Sfoglia il catalogo, leggi le specifiche e aggiungi al carrello quello che ti interessa.</div>
                                            </div>
                                            <div className="how-step">
                                                <div className="how-step-number">2</div>
                                                <div className="how-step-title">Inserisci i tuoi dati</div>
                                                <div className="how-step-desc">Vai al carrello e compila il form con nome, indirizzo di spedizione, email e telefono.</div>
                                            </div>
                                            <div className="how-step">
                                                <div className="how-step-number">3</div>
                                                <div className="how-step-title">Richiesta via WhatsApp</div>
                                                <div className="how-step-desc">Verrai reindirizzato su WhatsApp con il tuo ordine già scritto. Confermo io disponibilità e tempi.</div>
                                            </div>
                                            <div className="how-step">
                                                <div className="how-step-number">4</div>
                                                <div className="how-step-title">Produzione e spedizione</div>
                                                <div className="how-step-desc">Il pezzo viene stampato appositamente per te e spedito in 3–5 giorni lavorativi.</div>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                <div style={{textAlign: 'center', padding: '60px 20px'}}>
                                    <button className="btn btn-primary" onClick={() => setCurrentPage('products')} style={{padding: '18px 48px', fontSize: '1.15rem'}}>
                                        Vai ai Prodotti
                                    </button>
                                </div>
                            </div>
                        );
                }
            };

            if (loading) return (
                <div style={{display:'flex', alignItems:'center', justifyContent:'center', height:'100vh', color:'var(--text-secondary)', fontSize:'1.1rem'}}>
                    Caricamento...
                </div>
            );

            return (
                <div className="app">
                    <Navbar
                        currentPage={currentPage}
                        setCurrentPage={setCurrentPage}
                        cartCount={cart.reduce((sum, item) => sum + item.quantity, 0)}
                        wishlistCount={wishlist.length}
                        onToggleMobileMenu={() => setMobileMenuOpen(!mobileMenuOpen)}
                        mobileMenuOpen={mobileMenuOpen}
                        navItems={navItems}
                    />

                    <MobileMenu
                        isOpen={mobileMenuOpen}
                        currentPage={currentPage}
                        setCurrentPage={setCurrentPage}
                        wishlistCount={wishlist.length}
                        cartCount={cart.reduce((sum, item) => sum + item.quantity, 0)}
                        navItems={navItems}
                    />

                    <main>
                        {renderPage()}
                    </main>

                    <Footer onAdminClick={() => setCurrentPage(isAdmin ? 'admin' : 'admin-login')} />
                </div>
            );
        }

        // ============================================
        // RENDER APP
        // ============================================
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
