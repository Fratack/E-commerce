        // ============================================
        // LIGHTBOX COMPONENT
        // ============================================
        function Lightbox({ images, startIndex, onClose }) {
            const [current, setCurrent] = React.useState(startIndex || 0);

            const prev = (e) => {
                e && e.stopPropagation();
                setCurrent(c => (c - 1 + images.length) % images.length);
            };
            const next = (e) => {
                e && e.stopPropagation();
                setCurrent(c => (c + 1) % images.length);
            };

            React.useEffect(() => {
                const handleKey = (e) => {
                    if (e.key === 'Escape')      onClose();
                    if (e.key === 'ArrowLeft')   prev();
                    if (e.key === 'ArrowRight')  next();
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, []);

            return (
                <div className="lightbox-overlay" onClick={onClose}>
                    <button className="lightbox-close" onClick={onClose}>✕</button>

                    {images.length > 1 && (
                        <button className="lightbox-arrow prev" onClick={prev}>‹</button>
                    )}

                    <img
                        key={current}
                        className="lightbox-img"
                        src={images[current]}
                        alt={`Immagine ${current + 1}`}
                        onClick={e => e.stopPropagation()}
                    />

                    {images.length > 1 && (
                        <button className="lightbox-arrow next" onClick={next}>›</button>
                    )}

                    {images.length > 1 && (
                        <div className="lightbox-thumbs" onClick={e => e.stopPropagation()}>
                            {images.map((img, i) => (
                                <div
                                    key={i}
                                    className={`lightbox-thumb-dot ${i === current ? 'active' : ''}`}
                                    onClick={() => setCurrent(i)}
                                >
                                    <img src={img} alt="" />
                                </div>
                            ))}
                        </div>
                    )}

                    <div className="lightbox-counter">{current + 1} / {images.length}</div>
                </div>
            );
        }

        // ============================================
        // NAV EDITOR COMPONENT
        // ============================================
        const PAGE_OPTIONS = [
            { value: 'home',     label: '🏠 Home' },
            { value: 'products', label: '🛍️ Prodotti' },
            { value: 'cart',     label: '🛒 Carrello' },
            { value: 'wishlist', label: '❤️ Wishlist' },
            { value: 'info',     label: 'ℹ️ Info' },
        ];

        function NavEditor({ navItems, onSave }) {
            const [items, setItems] = React.useState(navItems);
            const [expandedId, setExpandedId] = React.useState(null);
            const [editingItem, setEditingItem] = React.useState(null);  // { id, label, page, isNew, parentId }
            const [newTop, setNewTop] = React.useState({ label: '', page: 'home' });
            const [newSub, setNewSub] = React.useState({});            // { [parentId]: { label, page } }
            const [saved, setSaved] = React.useState(false);

            const nextId = () => Date.now() + Math.random();

            // Move item up/down
            const moveItem = (index, dir, parentId) => {
                const updated = items.map(item => {
                    if (parentId && item.id === parentId) {
                        const subs = [...item.submenu];
                        const newIdx = index + dir;
                        if (newIdx < 0 || newIdx >= subs.length) return item;
                        [subs[index], subs[newIdx]] = [subs[newIdx], subs[index]];
                        return { ...item, submenu: subs };
                    }
                    return item;
                });
                if (!parentId) {
                    const arr = [...updated];
                    const newIdx = index + dir;
                    if (newIdx < 0 || newIdx >= arr.length) return;
                    [arr[index], arr[newIdx]] = [arr[newIdx], arr[index]];
                    setItems(arr);
                } else {
                    setItems(updated);
                }
            };

            // Delete top-level or sub
            const deleteItem = (id, parentId) => {
                if (!confirm('Eliminare questa voce?')) return;
                if (parentId) {
                    setItems(items.map(it => it.id === parentId
                        ? { ...it, submenu: it.submenu.filter(s => s.id !== id) }
                        : it
                    ));
                } else {
                    setItems(items.filter(it => it.id !== id));
                }
            };

            // Add top-level item
            const addTopItem = () => {
                if (!newTop.label.trim()) return;
                setItems([...items, { id: nextId(), label: newTop.label.trim(), page: newTop.page, submenu: [] }]);
                setNewTop({ label: '', page: 'home' });
            };

            // Add sub item
            const addSubItem = (parentId) => {
                const s = newSub[parentId] || { label: '', page: 'products' };
                if (!s.label.trim()) return;
                setItems(items.map(it => it.id === parentId
                    ? { ...it, submenu: [...(it.submenu || []), { id: nextId(), label: s.label.trim(), page: s.page }] }
                    : it
                ));
                setNewSub({ ...newSub, [parentId]: { label: '', page: 'products' } });
            };

            // Start inline edit
            const startEdit = (item, parentId) => {
                setEditingItem({ id: item.id, label: item.label, page: item.page, parentId: parentId || null });
            };

            // Confirm edit
            const confirmEdit = () => {
                const { id, label, page, parentId } = editingItem;
                if (parentId) {
                    setItems(items.map(it => it.id === parentId
                        ? { ...it, submenu: it.submenu.map(s => s.id === id ? { ...s, label, page } : s) }

            const emptyProduct = {

                image: '', galleryUrls: '',

                customizable: false, printMaterial: 'PETG', printProcess: 'FDM',
                weight: '', productionTime: '3-5 giorni lavorativi',
                shipping: 'Spedizione gratuita in Italia. Consegna in 5-7 giorni lavorativi.',

            };

            const [form, setForm] = React.useState(editProduct ? {
                ...emptyProduct, ...editProduct,
                price: String(editProduct.price || ''),
                oldPrice: editProduct.oldPrice ? String(editProduct.oldPrice) : '',
                galleryUrls: (editProduct.gallery || []).join(', '),
                printColors: editProduct.printColors || [],
                specs: editProduct.specs || [],
                compatibility: editProduct.compatibility || [],
                manuals: editProduct.manuals || [],
                tags: editProduct.tags || []
            } : emptyProduct);

            const [success, setSuccess] = React.useState('');

            // Temp inputs for list items
            const [specLabel, setSpecLabel] = React.useState('');
            const [specValue, setSpecValue] = React.useState('');
            const [compatItem, setCompatItem] = React.useState('');
            const [tagItem, setTagItem] = React.useState('');
            const [manualName, setManualName] = React.useState('');
            const [manualFile, setManualFile] = React.useState('');
            const [manualSize, setManualSize] = React.useState('');
            const [colorName, setColorName] = React.useState('');
            const [colorHex, setColorHex] = React.useState('#000000');
            const [colorExtra, setColorExtra] = React.useState('0');

            const set = (field, val) => setForm(prev => ({...prev, [field]: val}));

            const addSpec = () => {
                if (specLabel && specValue) {
                    set('specs', [...form.specs, {label: specLabel, value: specValue}]);
                    setSpecLabel(''); setSpecValue('');
                }
            };

            const addCompat = () => {
                if (compatItem) { set('compatibility', [...form.compatibility, compatItem]); setCompatItem(''); }
            };

            const addTag = () => {
                if (tagItem) { set('tags', [...form.tags, tagItem]); setTagItem(''); }
            };

            const addManual = () => {
                if (manualName && manualFile) {
                    set('manuals', [...form.manuals, {name: manualName, filename: manualFile, size: manualSize || '—'}]);
                    setManualName(''); setManualFile(''); setManualSize('');
                }
            };

            const addColor = () => {
                if (colorName) {
                    set('printColors', [...form.printColors, {name: colorName, hex: colorHex, extraCost: parseFloat(colorExtra) || 0}]);
                    setColorName(''); setColorHex('#000000'); setColorExtra('0');
                }
            };

            const removeItem = (field, index) => {
                set(field, form[field].filter((_, i) => i !== index));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!form.name || !form.price) { alert('Nome e prezzo sono obbligatori'); return; }

                const gallery = (form.galleryUrls ? form.galleryUrls.split(',').map(u => normalizePath(u.trim())).filter(Boolean) : []);
                const mainImage = normalizePath(form.image);
                if (mainImage && gallery.length === 0) gallery.push(mainImage);

                const product = {
                    id: editProduct ? editProduct.id : Date.now(),
                    name: form.name,
                    description: form.description,
                    longDescription: form.longDescription,
                    price: parseFloat(form.price),
                    oldPrice: form.oldPrice ? parseFloat(form.oldPrice) : null,
                    image: mainImage || gallery[0] || '',
                    rating: 5,
                    badge: form.badge || null,
                    gallery: gallery,
                    specs: form.specs,
                    compatibility: form.compatibility,
                    manuals: form.manuals,
                    tags: form.tags,
                    sku: form.sku,
                    category: form.category,
                    printColors: form.printColors,
                    customizable: form.customizable,
                    printMaterial: form.printMaterial,
                    printProcess: form.printProcess,
                    weight: form.weight,
                    productionTime: form.productionTime,
                    shipping: form.shipping,
                    returns: form.returns
                };

                onSave(product);
                setSuccess(editProduct ? 'Prodotto aggiornato!' : 'Prodotto aggiunto!');
                if (!editProduct) setForm(emptyProduct);
                setTimeout(() => setSuccess(''), 3000);
            };

            const categories = ['Tenere 700', 'Stampa 3D', 'Armeria', 'Progettazione', 'Arduino', 'Raspberry Pi', 'Droni FPV', 'Altro'];
            const badges = ['', 'New', 'Best Seller', 'Sale', 'Hot', 'Pro', 'Limited'];
            const materials = ['PLA', 'PETG', 'PETG-CF', 'ASA', 'ABS', 'Nylon', 'TPU', 'Resina', 'Altro'];

            return (
                <form onSubmit={handleSubmit}>

                                <label>SKU</label>
                                <input className="admin-input" placeholder="es. AIT-T700-ABS-001"

                            <textarea className="admin-textarea" placeholder="Descrizione dettagliata visibile nella pagina prodotto"
                                value={form.longDescription} onChange={e => set('longDescription', e.target.value)} />
                        </div>
                        <div className="admin-form-row three-col">

                                <label>Categoria</label>
                                <select className="admin-select" value={form.category} onChange={e => set('category', e.target.value)}>

                                </select>
                            </div>
                            <div className="admin-form-group">
                                <label>Badge</label>
                                <select className="admin-select" value={form.badge} onChange={e => set('badge', e.target.value)}>

                                <label>Peso</label>
                                <input className="admin-input" placeholder="es. 185g" value={form.weight} onChange={e => set('weight', e.target.value)} />
                            </div>
                        </div>

                                <label>Prezzo (€) *</label>
                                <input type="number" step="0.01" className="admin-input" placeholder="es. 110"
                                    value={form.price} onChange={e => set('price', e.target.value)} required />

        // ============================================
        // ADMIN PANEL COMPONENT
        // ============================================
        function AdminPanel({ onLogout, allProducts, onSaveProduct, onDeleteProduct, navItems, onSaveNavItems }) {
            const [tab, setTab] = React.useState('products');  // products | navigation
            const [view, setView] = React.useState('list'); // list | add | edit
            const [editProduct, setEditProduct] = React.useState(null);

            const handleEdit = (product) => {
                setEditProduct(product);
                setView('edit');
            };

            const handleSave = (product) => {
                onSaveProduct(product);
                setView('list');
                setEditProduct(null);
            };

            const handleDelete = (id) => {
                if (confirm('Sei sicuro di voler eliminare questo prodotto?')) {
                    onDeleteProduct(id);
                }
            };

            const categoryCounts = {};
            allProducts.forEach(p => {
                categoryCounts[p.category] = (categoryCounts[p.category] || 0) + 1;
            });

            return (
                <div className="page active">
                    <div className="admin-panel">
                        {/* Header */}
                        <div className="admin-header">
                            <h1>⚙️ Pannello Admin</h1>
                            <div className="admin-header-actions">
                                {tab === 'products' && view !== 'list' && (
                                    <button className="btn btn-secondary" onClick={() => { setView('list'); setEditProduct(null); }} style={{padding:'12px 20px'}}>
                                        ← Lista Prodotti
                                    </button>
                                )}
                                {tab === 'products' && view === 'list' && (
                                    <button className="btn btn-primary" onClick={() => setView('add')} style={{padding:'12px 24px'}}>
                                        ➕ Nuovo Prodotto
                                    </button>
                                )}

                            </div>
                        </div>

                        {/* Tabs */}
                        <div className="admin-tabs">
                            <button className={`admin-tab ${tab === 'products' ? 'active' : ''}`} onClick={() => { setTab('products'); setView('list'); }}>
                                🛍️ Prodotti
                            </button>
                            <button className={`admin-tab ${tab === 'navigation' ? 'active' : ''}`} onClick={() => setTab('navigation')}>
                                🧭 Navigazione
                            </button>
                        </div>

                        {/* TAB: PRODUCTS */}
                        {tab === 'products' && (
                            <>
                                {view === 'list' && (
                                    <>
                                        <div className="admin-stats">
                                            <div className="admin-stat-card">
                                                <div className="number">{allProducts.length}</div>
                                                <div className="label">Prodotti totali</div>
                                            </div>
                                            <div className="admin-stat-card">
                                                <div className="number">{Object.keys(categoryCounts).length}</div>
                                                <div className="label">Categorie</div>
                                            </div>
                                            <div className="admin-stat-card">
                                                <div className="number">{allProducts.filter(p => p.badge === 'New').length}</div>
                                                <div className="label">Nuovi</div>
                                            </div>
                                            <div className="admin-stat-card">
                                                <div className="number">{allProducts.filter(p => p.oldPrice).length}</div>
                                                <div className="label">In offerta</div>
                                            </div>
                                        </div>

                                        <div className="admin-products-list">
                                            {allProducts.map(p => (
                                                <div key={p.id} className="admin-product-row">
                                                    <img src={normalizePath(p.image)} alt={p.name} />
                                                    <div>
                                                        <div className="name">{p.name}</div>
                                                        <div className="category">{p.category || '—'}</div>
                                                    </div>
                                                    <div className="price">€{p.price}</div>
                                                    <div className="badge-col">{p.badge || '—'}</div>
                                                    <div className="actions">
                                                        <button className="admin-btn-sm" onClick={() => handleEdit(p)}>✏️</button>
                                                        <button className="admin-btn-sm danger" onClick={() => handleDelete(p.id)}>🗑️</button>
                                                    </div>
                                                </div>
                                            ))}
                                            {allProducts.length === 0 && (
                                                <div style={{textAlign:'center', padding:'40px', color:'var(--text-muted)'}}>

                                                </div>

                                    </>

                                {view === 'add' && (
                                    <AddProductForm onSave={handleSave} onCancel={() => setView('list')} />

                                {view === 'edit' && editProduct && (
                                    <AddProductForm onSave={handleSave} onCancel={() => { setView('list'); setEditProduct(null); }} editProduct={editProduct} />

                        {tab === 'navigation' && (

        // ============================================
        // MAIN APP COMPONENT
        // ============================================
        function App() {
            // Legge l'URL iniziale per capire quale pagina/prodotto mostrare
            const parseUrl = () => {
                const p = window.location.pathname;
                if (p.startsWith('/prodotti/')) return { page: 'product-detail', slug: p.replace('/prodotti/', '') };
                if (p === '/prodotti') return { page: 'products', slug: null };
                if (p === '/carrello') return { page: 'cart', slug: null };
                if (p === '/preferiti') return { page: 'wishlist', slug: null };
                return { page: 'home', slug: null };
            };

            const initialUrl = parseUrl();

            // State
            const [currentPage, setCurrentPage] = React.useState(initialUrl.slug ? 'loading' : initialUrl.page);
            const [selectedProductId, setSelectedProductId] = React.useState(null);
            const [pendingSlug, setPendingSlug] = React.useState(initialUrl.slug);
            const [activeCategory, setActiveCategory] = React.useState(null);
            const [cart, setCart] = React.useState(() => {
                try { return JSON.parse(localStorage.getItem('peglab-cart')) || []; } catch { return []; }
            });
            const [wishlist, setWishlist] = React.useState(() => {
                try { return JSON.parse(localStorage.getItem('peglab-wishlist')) || []; } catch { return []; }
            });
            const [mobileMenuOpen, setMobileMenuOpen] = React.useState(false);

            // Prodotti e nav dal server
            const [allProducts, setAllProducts] = React.useState([]);
            const [navItems, setNavItems] = React.useState(defaultNavItems);
            const [loading, setLoading] = React.useState(true);
            const [isAdmin, setIsAdmin] = React.useState(false);

            // Carica dati dal server all'avvio
            React.useEffect(() => {
                Promise.all([api.getProducts(), api.getNav()])
                    .then(([prods, nav]) => {
                        setAllProducts(prods || []);
                        if (nav) setNavItems(nav);
                    })
                    .catch(() => {})
                    .finally(() => setLoading(false));
            }, []);

            React.useEffect(() => { localStorage.setItem('peglab-cart', JSON.stringify(cart)); }, [cart]);
            React.useEffect(() => { localStorage.setItem('peglab-wishlist', JSON.stringify(wishlist)); }, [wishlist]);

            // Risolve lo slug pendente non appena i prodotti sono caricati
            React.useEffect(() => {
                if (!pendingSlug || allProducts.length === 0) return;
                const product = allProducts.find(p => p.slug === pendingSlug);
                if (product) {
                    setSelectedProductId(product.id);
                    setCurrentPage('product-detail');
                } else {
                    setCurrentPage('products');
                }
                setPendingSlug(null);
            }, [allProducts, pendingSlug]);

            // Aggiorna il tema del body al cambio di categoria
            React.useEffect(() => {
                document.body.dataset.theme = activeCategory || '';
            }, [activeCategory]);

            // Gestisce il tasto back/forward del browser
            React.useEffect(() => {
                const handlePopState = () => {
                    const { page, slug } = parseUrl();
                    if (slug) {
                        const product = allProducts.find(p => p.slug === slug);
                        if (product) {
                            setSelectedProductId(product.id);
                            setCurrentPage('product-detail');
                        }
                    } else {
                        setCurrentPage(page);
                    }
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, [allProducts]);

            const reloadProducts = () => api.getProducts().then(prods => setAllProducts(prods || []));

            const saveNavItems = (updated) => {
                setNavItems(updated);
                api.saveNav(updated);
            };

            // Admin: salva prodotto (nuovo o modifica)
            const handleSaveProduct = (product) => {
                const isEdit = allProducts.some(p => p.id === product.id);
                api.saveProduct(product, isEdit).then(reloadProducts);
            };

            // Admin: elimina prodotto
            const handleDeleteProduct = (id) => {
                api.deleteProduct(id).then(reloadProducts);
            };

            // Navigate to category
            const goToCategory = (cat) => {
                setActiveCategory(cat);
                setCurrentPage('products');
                window.history.pushState({ page: 'products' }, '', '/prodotti');
                window.scrollTo(0, 0);
            };

            // Navigate to product detail
            const goToProduct = (productId) => {
                const product = allProducts.find(p => p.id === productId);
                setSelectedProductId(productId);
                setCurrentPage('product-detail');
                window.scrollTo(0, 0);
                if (product && product.slug) {
                    window.history.pushState({ page: 'product-detail', productId }, '', `/prodotti/${product.slug}`);
                }
            };

            // Cart functions
            const addToCart = (product) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) {
                        return prev.map(item =>
                            item.id === product.id ? {...item, quantity: item.quantity + 1} : item
                        );
                    }
                    return [...prev, {...product, quantity: 1}];
                });
            };

            const updateCartQuantity = (id, quantity) => {
                if (quantity <= 0) {
                    setCart(prev => prev.filter(item => item.id !== id));
                } else {
                    setCart(prev => prev.map(item =>
                        item.id === id ? {...item, quantity} : item
                    ));
                }
            };

            const removeFromCart = (id) => {
                setCart(prev => prev.filter(item => item.id !== id));
            };

            const clearCart = () => {
                if (confirm('Sei sicuro di voler svuotare il carrello?')) {
                    setCart([]);
                }
            };

            // Wishlist functions
            const toggleWishlist = (id) => {
                setWishlist(prev =>
                    prev.includes(id) ? prev.filter(item => item !== id) : [...prev, id]
                );
            };

            // Render pages
            const renderPage = () => {
                switch(currentPage) {
                    case 'admin-login':
                        return <AdminLogin onLogin={(success) => { if(success) { setIsAdmin(true); setCurrentPage('admin'); } }} />;
                    case 'admin':
                        if (!isAdmin) return <AdminLogin onLogin={(success) => { if(success) { setIsAdmin(true); setCurrentPage('admin'); } }} />;
                        return (
                            <AdminPanel
                                onLogout={() => { setIsAdmin(false); setCurrentPage('home'); }}
                                allProducts={allProducts}
                                onSaveProduct={handleSaveProduct}
                                onDeleteProduct={handleDeleteProduct}
                                navItems={navItems}
                                onSaveNavItems={saveNavItems}
                            />
                        );
                    case 'product-detail':
                        const selectedProduct = allProducts.find(p => p.id === selectedProductId);
                        if (!selectedProduct) return null;
                        return (
                            <div data-category={selectedProduct.category}>
                            <ProductDetail
                                product={selectedProduct}
                                onAddToCart={addToCart}
                                onToggleWishlist={toggleWishlist}
                                isWishlisted={wishlist.includes(selectedProductId)}
                                onBack={() => { setCurrentPage('products'); window.history.pushState({ page: 'products' }, '', '/prodotti'); }}
                            />
                            </div>
                        );
                    case 'cart':
                        return (
                            <CartPage 
                                cart={cart}
                                onUpdateQuantity={updateCartQuantity}
                                onRemove={removeFromCart}
                                onClearCart={clearCart}
                                onCheckout={() => setCurrentPage('products')}
                            />
                        );
                    case 'wishlist':
                        return (
                            <WishlistPage
                                wishlist={wishlist}
                                products={allProducts}
                                onAddToCart={addToCart}
                                onToggleWishlist={toggleWishlist}
                                onViewProduct={goToProduct}
                            />
                        );
                    case 'info':
                        return <InfoPage />;
                    case 'products': {
                        const filteredProducts = activeCategory
                            ? allProducts.filter(p => p.category === activeCategory)
                            : allProducts;
                        const catCounts = { moto: 0, armeria: 0, eventi: 0 };
                        allProducts.forEach(p => { if (catCounts[p.category] !== undefined) catCounts[p.category]++; });
                        return (
                            <div className="page active">
                                <div className="container">
                                    <div className="page-header">
                                        <h1 className="page-title">
                                            {activeCategory === 'moto' && '🏍️ Accessori Moto'}
                                            {activeCategory === 'armeria' && '🎯 Accessori Armeria'}
                                            {activeCategory === 'eventi' && '🎉 Stampe 3D per Eventi'}
                                            {!activeCategory && '🛍️ Tutti i Prodotti'}
                                        </h1>
                                        <p className="page-subtitle">{filteredProducts.length} prodotti disponibili</p>
                                    </div>
                                    <div className="products-section">
                                        <ProductGrid
                                            products={filteredProducts}
                                            onAddToCart={addToCart}
                                            onToggleWishlist={toggleWishlist}
                                            wishlist={wishlist}
                                            onViewProduct={goToProduct}
                                        />
                                    </div>
                                </div>
                            </div>
                        );
                    }
                    default: // home
                        return (
                            <div className="page active">

                                {/* HERO */}
                                <section className="pg-hero">
                                    <div className="container">
                                        <div className="pg-hero-grid">
                                            <div className="pg-hero-content">
                                                <div className="pg-hero-badge">Made in Italy · Stampa 3D · Elettronica</div>
                                                <h1 className="pg-hero-title">
                                                    Progetti fatti a mano,<br/>
                                                    <span className="pg-gradient-text">pezzo per pezzo.</span>
                                                </h1>
                                                <p className="pg-hero-sub">
                                                    Accessori stampati in 3D con precisione ingegneristica. Ogni prodotto nasce da un problema reale, progettato, testato e spedito a mano da un singolo artigiano.
                                                </p>
                                                <div className="pg-hero-btns">
                                                    <button className="btn btn-primary" onClick={() => setCurrentPage('products')}>
                                                        Sfoglia il catalogo
                                                    </button>
                                                    <button className="btn btn-secondary" onClick={() => document.getElementById('chi-siamo')?.scrollIntoView({behavior:'smooth'})}>
                                                        Chi siamo
                                                    </button>
                                                </div>
                                            </div>
                                            <div className="pg-hero-visual">
                                                <div className="pg-spec-card">
                                                    <div className="pg-spec-header">PEGLAB · BUILD LOG</div>
                                                    <div className="pg-spec-rows">
                                                        <div className="pg-spec-row"><span>Materiale</span><span>PETG / PLA+</span></div>
                                                        <div className="pg-spec-row"><span>Layer height</span><span>0.15 mm</span></div>
                                                        <div className="pg-spec-row"><span>Infill</span><span>40 %</span></div>
                                                        <div className="pg-spec-row"><span>Tolleranza</span><span>± 0.1 mm</span></div>
                                                        <div className="pg-spec-row"><span>Produzione</span><span>Su ordine</span></div>
                                                        <div className="pg-spec-row"><span>Status</span><span className="pg-status-on">● ATTIVO</span></div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                {/* PILLARS */}
                                <section className="pg-features">
                                    <div className="container">
                                        <div className="pg-features-grid">
                                            <div className="pg-feature">
                                                <div className="pg-feature-icon">🖨️</div>
                                                <div className="pg-feature-title">Stampa 3D tecnica</div>
                                                <div className="pg-feature-desc">PETG, PLA+ e materiali tecnici ad alta resistenza. Tolleranze ±0.1mm su ogni pezzo.</div>
                                            </div>
                                            <div className="pg-feature">
                                                <div className="pg-feature-icon">⚡</div>
                                                <div className="pg-feature-title">Elettronica custom</div>
                                                <div className="pg-feature-desc">Schede, centraline e progetti embedded progettati da zero per esigenze specifiche.</div>
                                            </div>
                                            <div className="pg-feature">
                                                <div className="pg-feature-icon">🎯</div>
                                                <div className="pg-feature-title">Soluzioni su misura</div>
                                                <div className="pg-feature-desc">Prototipi, ricambi e oggetti funzionali progettati per risolvere problemi reali.</div>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                {/* CATEGORIE */}
                                <section className="cat-section">
                                    <div className="container">
                                        <div className="pg-section-header">
                                            <div className="how-label">Cosa trovi qui</div>
                                            <h2 className="how-title">Le nostre categorie</h2>
                                        </div>
                                        <div className="cat-cards-grid">
                                            <div className="cat-card moto" onClick={() => goToCategory('moto')}>
                                                <span className="cat-card-icon">🏍️</span>
                                                <div className="cat-card-title">Accessori Moto</div>
                                                <div className="cat-card-desc">Ricambi e accessori stampati in 3D su misura per moto adventure e enduro. Ogni pezzo progettato e testato sul campo.</div>
                                                <div className="cat-card-count">3 prodotti disponibili <span className="cat-card-arrow">→</span></div>
                                            </div>
                                            <div className="cat-card armeria" onClick={() => goToCategory('armeria')}>
                                                <span className="cat-card-icon">🎯</span>
                                                <div className="cat-card-title">Accessori Armeria</div>
                                                <div className="cat-card-desc">Accessori per tiro sportivo e armeria stampati in 3D: porta caricatori, scatole porta colpi, supporti e molto altro.</div>
                                                <div className="cat-card-count">3 prodotti disponibili <span className="cat-card-arrow">→</span></div>
                                            </div>
                                            <div className="cat-card eventi" onClick={() => goToCategory('eventi')}>
                                                <span className="cat-card-icon">🎉</span>
                                                <div className="cat-card-title">Stampe 3D per Eventi</div>
                                                <div className="cat-card-desc">Decorazioni personalizzate per compleanni, matrimoni, battesimi ed eventi. Ogni pezzo è unico e fatto su misura per te.</div>
                                                <div className="cat-card-count">3 prodotti disponibili <span className="cat-card-arrow">→</span></div>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                {/* PRODOTTI IN EVIDENZA */}
                                {products.length > 0 && (
                                    <section className="pg-featured">
                                        <div className="container">
                                            <div className="pg-section-header">
                                                <div className="how-label">Catalogo</div>
                                                <h2 className="how-title">Prodotti in evidenza</h2>
                                            </div>
                                            <div className="pg-featured-grid">
                                                {products.slice(0, 3).map(product => (
                                                    <ProductCard
                                                        key={product.id}
                                                        product={product}
                                                        onAddToCart={addToCart}
                                                        onToggleWishlist={toggleWishlist}
                                                        isWishlisted={wishlist.includes(product.id)}
                                                        onViewProduct={goToProduct}
                                                    />
                                                ))}
                                            </div>
                                        </div>
                                    </section>
                                )}

                                {/* CHI SIAMO */}
                                <section className="story-section" id="chi-siamo">
                                    <div className="container">
                                        <div className="pg-about-grid">
                                            <div>
                                                <div className="pg-lab-card">
                                                    <div className="pg-lab-header">
                                                        <span className="pg-lab-dot red"></span>
                                                        <span className="pg-lab-dot yellow"></span>
                                                        <span className="pg-lab-dot green"></span>
                                                        <span className="pg-lab-title">peg@lab:~$</span>
                                                    </div>
                                                    <div className="pg-lab-body">
                                                        <div><span className="pg-cmd">cat</span> about.txt</div>
                                                        <div className="pg-output">Progettista meccanico ed elettronico.</div>
                                                        <div className="pg-output">Appassionato di stampa 3D e design.</div>
                                                        <div className="pg-output">Ogni pezzo nasce da un problema reale.</div>
                                                        <div style={{marginTop:'8px'}}><span className="pg-cmd">ls</span> projects/</div>
                                                        <div className="pg-output">componenti_tecnici/</div>
                                                        <div className="pg-output">elettronica_custom/</div>
                                                        <div className="pg-output">oggetti_funzionali/</div>
                                                        <div className="pg-output" style={{color:'var(--text-muted)'}}>+ altri in arrivo...</div>
                                                        <div style={{marginTop:'8px'}}><span className="pg-cursor">█</span></div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div>
                                                <div className="story-label">Vision</div>
                                                <h2 className="story-title">Un progettista appassionato,<br/>non una fabbrica</h2>
                                                <p className="story-text">
                                                    Sono un progettista meccanico ed elettronico con la passione per la stampa 3D e il design funzionale. Ogni prodotto che trovi qui è nato da un problema reale: ho disegnato la soluzione, l'ho stampata, testata e migliorata finché non era esattamente come la volevo.
                                                </p>
                                                <p className="story-text">
                                                    Ogni ordine viene prodotto appositamente per te. Non ho magazzini pieni di pezzi identici: ogni pezzo è stampato, controllato e spedito a mano.
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                {/* COME FUNZIONA */}
                                <section className="how-section" id="come-funziona">
                                    <div className="container">
                                        <div className="how-header">
                                            <div className="how-label">Processo d'acquisto</div>
                                            <h2 className="how-title">Come funziona l'ordine</h2>
                                        </div>
                                        <div className="how-steps">
                                            <div className="how-step">
                                                <div className="how-step-number">1</div>
                                                <div className="how-step-title">Scegli il prodotto</div>
                                                <div className="how-step-desc">Sfoglia il catalogo, leggi le specifiche e aggiungi al carrello quello che ti interessa.</div>
                                            </div>
                                            <div className="how-step">
                                                <div className="how-step-number">2</div>
                                                <div className="how-step-title">Inserisci i tuoi dati</div>
                                                <div className="how-step-desc">Vai al carrello e compila il form con nome, indirizzo di spedizione, email e telefono.</div>
                                            </div>
                                            <div className="how-step">
                                                <div className="how-step-number">3</div>
                                                <div className="how-step-title">Richiesta via WhatsApp</div>
                                                <div className="how-step-desc">Verrai reindirizzato su WhatsApp con il tuo ordine già scritto. Confermo io disponibilità e tempi.</div>
                                            </div>
                                            <div className="how-step">
                                                <div className="how-step-number">4</div>
                                                <div className="how-step-title">Produzione e spedizione</div>
                                                <div className="how-step-desc">Il pezzo viene stampato appositamente per te e spedito in 3–5 giorni lavorativi.</div>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                {/* CTA */}
                                <div style={{textAlign:'center', padding:'60px 20px'}}>
                                    <button className="btn btn-primary" onClick={() => setCurrentPage('products')} style={{padding:'18px 48px', fontSize:'1.15rem'}}>
                                        Vai ai Prodotti
                                    </button>
                                </div>

                            </div>
                        );
                }
            };

            if (loading) return (
                <div style={{display:'flex', alignItems:'center', justifyContent:'center', height:'100vh', color:'var(--text-secondary)', fontSize:'1.1rem'}}>
                    Caricamento...
                </div>
            );

            return (
                <div className="app">
                    <Navbar
                        currentPage={currentPage}
                        setCurrentPage={setCurrentPage}
                        goToCategory={goToCategory}
                        activeCategory={activeCategory}
                        cartCount={cart.reduce((sum, item) => sum + item.quantity, 0)}
                        wishlistCount={wishlist.length}
                        onToggleMobileMenu={() => setMobileMenuOpen(!mobileMenuOpen)}
                        mobileMenuOpen={mobileMenuOpen}
                        navItems={navItems}
                    />

                    <MobileMenu
                        isOpen={mobileMenuOpen}
                        currentPage={currentPage}
                        setCurrentPage={setCurrentPage}
                        goToCategory={goToCategory}
                        activeCategory={activeCategory}
                        wishlistCount={wishlist.length}
                        cartCount={cart.reduce((sum, item) => sum + item.quantity, 0)}
                        navItems={navItems}
                        onClose={() => setMobileMenuOpen(false)}
                    />

                    <main>
                        {renderPage()}
                    </main>

                    <Footer onAdminClick={() => setCurrentPage(isAdmin ? 'admin' : 'admin-login')} />
                </div>
            );
        }

        // ============================================
        // RENDER APP
        // ============================================
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
