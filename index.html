<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aitycons — Tech & Automation Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ============================================
           VARIABILI CSS
           ============================================ */
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --bg-card-hover: #222230;
            --accent-blue: #3b82f6;
            --accent-violet: #8b5cf6;
            --accent-cyan: #06b6d4;
            --accent-purple: #a855f7;
            --gradient-primary: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #a855f7 100%);
            --gradient-glow: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(139, 92, 246, 0.2) 100%);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-glow: rgba(139, 92, 246, 0.3);
            --danger: #ef4444;
            --success: #22c55e;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* ============================================
           RESET & BASE
           ============================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-family);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            cursor: default;
            caret-color: transparent;
        }

        input, textarea { caret-color: auto; cursor: text; }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse 80% 60% at 10% 10%, rgba(139, 92, 246, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 90% 15%, rgba(59, 130, 246, 0.1) 0%, transparent 55%),
                radial-gradient(ellipse 70% 50% at 50% 40%, rgba(168, 85, 247, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
        }

        a { color: var(--accent-violet); text-decoration: none; transition: color 0.3s ease; }
        a:hover { color: var(--accent-blue); }

        /* ============================================
           CONTAINER
           ============================================ */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* ============================================
           HEADER / NAVBAR
           ============================================ */
        .header {
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .logo img {
            height: 88px;
            width: auto;
        }

        /* Menu Desktop */
        .nav-menu {
            display: flex;
            gap: 8px;
            list-style: none;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 22px;
            border-radius: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-link:hover { color: var(--text-primary); background: var(--gradient-glow); }
        .nav-link.active { color: var(--text-primary); background: var(--gradient-primary); }

        /* ============================================
           DROPDOWN MENU
           ============================================ */
        .nav-item {
            position: relative;
        }

        .nav-item .nav-link .dropdown-arrow {
            font-size: 0.7rem;
            margin-left: 4px;
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .nav-item:hover .nav-link .dropdown-arrow {
            transform: rotate(180deg);
        }

        .dropdown-menu {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            min-width: 200px;
            background: rgba(18, 18, 26, 0.97);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-radius: 14px;
            padding: 8px;
            list-style: none;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px);
            transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s;
            z-index: 999;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 30px rgba(139,92,246,0.15);
        }

        .nav-item:hover .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-menu li a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .dropdown-menu li a:hover {
            color: var(--text-primary);
            background: var(--gradient-glow);
            padding-left: 22px;
        }

        .dropdown-divider {
            height: 1px;
            background: var(--border-glow);
            margin: 6px 8px;
        }

        /* Icone Header */
        .header-icons {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px; height: 44px;
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .icon-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-violet);
        }

        .icon-btn.liked { color: var(--danger); }

        .badge {
            position: absolute;
            top: -5px; right: -5px;
            background: var(--danger);
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 700;
            min-width: 18px;
            text-align: center;
        }

        .badge.success { background: var(--success); }

        /* ============================================
           MENU HAMBURGER (MOBILE)
           ============================================ */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 10px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: var(--text-primary);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(7px, -6px); }

        /* Mobile Menu */
        .mobile-menu {
            display: none;
            position: fixed;
            top: 74px; left: 0;
            width: 100%;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-glow);
            padding: 20px;
            z-index: 999;
        }

        .mobile-menu.active { display: block; }

        .mobile-menu .nav-link {
            display: block;
            padding: 15px 20px;
            margin-bottom: 5px;
        }

        /* ============================================
           HERO SECTION
           ============================================ */
        .hero {
            text-align: center;
            padding: 80px 20px;
        }

        .hero-title {
            font-size: 3rem;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        .hero-subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }

        /* ============================================
           PAGE SECTIONS
           ============================================ */
        .page { display: none; }
        .page.active { display: block; }

        .page-header {
            padding: 40px 0;
            text-align: center;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .page-subtitle { color: var(--text-secondary); font-size: 1.1rem; }

        /* ============================================
           PRODUCTS GRID
           ============================================ */
        .products-section { padding: 40px 0; }

        .products-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .products-title { font-size: 2rem; font-weight: 700; }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .no-products {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .no-products h3 { font-size: 1.5rem; margin-bottom: 10px; }

        /* ============================================
           PRODUCT CARD
           ============================================ */
        .product-card {
            background: var(--bg-card);
            border: 2px solid var(--border-glow);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            position: relative;
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .product-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-violet);
            box-shadow: 0 20px 50px rgba(139, 92, 246, 0.35);
        }

        .product-image-wrapper { position: relative; overflow: hidden; }

        .product-image {
            width: 100%; height: 220px;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-image { transform: scale(1.05); }

        .product-badge {
            position: absolute;
            top: 18px; right: 18px;
            background: var(--gradient-primary);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .product-wishlist {
            position: absolute;
            top: 18px; left: 18px;
            width: 40px; height: 40px;
            background: rgba(0,0,0,0.5);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-wishlist:hover { background: var(--danger); }
        .product-wishlist.liked { background: var(--danger); color: white; }

        .product-content { padding: 20px 24px; display: flex; flex-direction: column; flex: 1; }

        .product-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .product-rating { color: var(--accent-violet); font-size: 1rem; margin-bottom: 10px; letter-spacing: 2px; }

        .product-price {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: auto;
        }

        .price-current { font-size: 1.5rem; font-weight: 800; color: var(--accent-cyan); }
        .price-old { font-size: 1rem; color: var(--text-muted); text-decoration: line-through; }

        .product-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: var(--font-family);
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border: 1px solid var(--border-glow);
        }

        .btn-secondary:hover {
            border-color: var(--accent-violet);
        }

        /* ============================================
           CART PAGE
           ============================================ */
        .cart-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 40px;
            padding: 40px 0;
        }

        .cart-items { background: var(--bg-card); border-radius: 20px; padding: 30px; }

        .cart-item {
            display: grid;
            grid-template-columns: 100px 1fr auto;
            gap: 20px;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-glow);
        }

        .cart-item:last-child { border-bottom: none; }

        .cart-item-image {
            width: 100px; height: 100px;
            object-fit: cover;
            border-radius: 12px;
        }

        .cart-item-info h3 { font-size: 1.1rem; margin-bottom: 5px; }
        .cart-item-info .price { color: var(--accent-cyan); font-weight: 700; font-size: 1.2rem; }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .qty-btn {
            width: 32px; height: 32px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .qty-btn:hover { border-color: var(--accent-violet); background: var(--bg-card-hover); }
        .qty-value { font-size: 1.1rem; font-weight: 600; min-width: 30px; text-align: center; }

        .cart-item-remove {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 10px;
            transition: all 0.3s ease;
        }

        .cart-item-remove:hover { transform: scale(1.2); }

        /* Cart Summary */
        .cart-summary {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .cart-summary h2 { font-size: 1.5rem; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border-glow); }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            color: var(--text-secondary);
        }

        .summary-row.total {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid var(--accent-violet);
        }

        .summary-row.total .value { color: var(--accent-cyan); }

        .cart-summary .btn { width: 100%; margin-top: 20px; padding: 16px; font-size: 1.1rem; }

        .empty-cart {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-cart .icon { font-size: 4rem; margin-bottom: 20px; }
        .empty-cart h3 { font-size: 1.5rem; margin-bottom: 10px; color: var(--text-secondary); }
        .empty-cart p { color: var(--text-muted); margin-bottom: 20px; }

        /* ============================================
           WISHLIST PAGE
           ============================================ */
        .wishlist-section { padding: 40px 0; }

        /* ============================================
           INFO PAGE
           ============================================ */
        .info-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        .info-content h2 {
            font-size: 2rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
        }

        .info-content p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 40px 0;
            text-align: left;
        }

        .info-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
        }

        .info-card .icon { font-size: 2.5rem; margin-bottom: 15px; }
        .info-card h3 { font-size: 1.2rem; margin-bottom: 10px; }
        .info-card p { font-size: 0.95rem; color: var(--text-muted); }

        /* ============================================
           FOOTER
           ============================================ */
        .footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-glow);
            padding: 40px 20px;
            margin-top: 60px;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
        }

        .footer-section h4 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .footer-section ul { list-style: none; }
        .footer-section ul li { margin-bottom: 10px; }
        .footer-section ul li a { color: var(--text-secondary); }
        .footer-section ul li a:hover { color: var(--accent-violet); }

        .footer-bottom {
            text-align: center;
            padding-top: 30px;
            margin-top: 30px;
            border-top: 1px solid var(--border-glow);
            color: var(--text-muted);
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 992px) {
            .cart-container { grid-template-columns: 1fr; }
            .cart-summary { position: static; }
        }

        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .hamburger { display: flex; }
            .logo img { height: 44px; }
            .header-container { padding: 10px 16px; }
.products-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
            .hero-title { font-size: 2rem; }
            .page-title { font-size: 1.8rem; }

            .cart-item { grid-template-columns: 80px 1fr; gap: 15px; }
            .cart-item-quantity { grid-column: 2; }
            .cart-item-remove { grid-column: 2; justify-self: end; }

            .footer-content { grid-template-columns: 1fr; text-align: center; }
        }

        @media (max-width: 480px) {
            .products-grid { grid-template-columns: 1fr; max-width: 350px; margin: 0 auto; }
            .product-image { height: 180px; }
            .product-name { font-size: 1rem; }
        }

        /* ============================================
           ANIMATIONS
           ============================================ */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-card:nth-child(1) { animation-delay: 0.05s; }
        .product-card:nth-child(2) { animation-delay: 0.1s; }
        .product-card:nth-child(3) { animation-delay: 0.15s; }
        .product-card:nth-child(4) { animation-delay: 0.2s; }
        .product-card:nth-child(5) { animation-delay: 0.25s; }
        .product-card:nth-child(6) { animation-delay: 0.3s; }
        .product-card:nth-child(7) { animation-delay: 0.35s; }
        .product-card:nth-child(8) { animation-delay: 0.4s; }
        .product-card:nth-child(9) { animation-delay: 0.45s; }
        .product-card:nth-child(10) { animation-delay: 0.5s; }

        /* ============================================
           PRODUCT DETAIL PAGE
           ============================================ */
        .product-detail {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .pd-breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .pd-breadcrumb a {
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.2s;
        }

        .pd-breadcrumb a:hover { color: var(--accent-violet); }
        .pd-breadcrumb .separator { color: var(--text-muted); }
        .pd-breadcrumb .current { color: var(--text-primary); }

        .pd-main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            margin-bottom: 50px;
        }

        /* Gallery */
        .pd-gallery {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .pd-gallery-main {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--border-glow);
            background: var(--bg-card);
        }

        .pd-gallery-main img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .pd-gallery-main:hover img {
            transform: scale(1.05);
        }

        .pd-gallery-thumbs {
            display: flex;
            gap: 12px;
        }

        .pd-thumb {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--border-glow);
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0.5;
        }

        .pd-thumb.active, .pd-thumb:hover {
            border-color: var(--accent-violet);
            opacity: 1;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
        }

        .pd-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Info */
        .pd-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .pd-badge {
            display: inline-block;
            background: var(--gradient-primary);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
            width: fit-content;
        }

        .pd-title {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .pd-sku {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .pd-rating-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pd-stars {
            color: var(--accent-violet);
            font-size: 1.3rem;
            letter-spacing: 3px;
        }

        .pd-rating-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .pd-price-row {
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        .pd-price {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent-cyan);
        }

        .pd-price-old {
            font-size: 1.3rem;
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .pd-price-vat {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .pd-description {
            color: var(--text-secondary);
            line-height: 1.8;
            font-size: 1rem;
        }

        .pd-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .pd-tag {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Quantity + actions */
        .pd-quantity {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pd-quantity label {
            color: var(--text-secondary);
            font-weight: 600;
        }

        .pd-qty-controls {
            display: flex;
            align-items: center;
            gap: 0;
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            overflow: hidden;
        }

        .pd-qty-btn {
            width: 40px;
            height: 40px;
            background: var(--bg-card);
            border: none;
            color: var(--text-primary);
            font-size: 1.2rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .pd-qty-btn:hover { background: var(--bg-card-hover); }

        .pd-qty-value {
            width: 50px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .pd-actions {
            display: flex;
            gap: 12px;
        }

        .pd-actions .btn-primary {
            flex: 1;
            padding: 16px 30px;
            font-size: 1.1rem;
        }

        .pd-actions .btn-wishlist {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 14px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .pd-actions .btn-wishlist:hover {
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        /* Info badges row */
        .pd-info-badges {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .pd-info-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px;
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
        }

        .pd-info-badge .icon { font-size: 1.4rem; }

        .pd-info-badge .text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.3;
        }

        .pd-info-badge .text strong {
            display: block;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        /* Tabs section */
        .pd-tabs {
            margin-top: 50px;
        }

        .pd-tabs-nav {
            display: flex;
            gap: 4px;
            border-bottom: 2px solid var(--border-glow);
            margin-bottom: 30px;
            overflow-x: auto;
        }

        .pd-tab-btn {
            padding: 14px 24px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .pd-tab-btn:hover { color: var(--text-primary); }

        .pd-tab-btn.active {
            color: var(--text-primary);
            border-bottom-color: var(--accent-violet);
        }

        .pd-tab-content {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 30px;
        }

        /* Specs table */
        .pd-specs-table {
            width: 100%;
            border-collapse: collapse;
        }

        .pd-specs-table tr {
            border-bottom: 1px solid rgba(139, 92, 246, 0.1);
        }

        .pd-specs-table tr:last-child { border-bottom: none; }

        .pd-specs-table td {
            padding: 14px 16px;
            font-size: 0.95rem;
        }

        .pd-specs-table td:first-child {
            color: var(--text-secondary);
            font-weight: 600;
            width: 220px;
        }

        .pd-specs-table td:last-child {
            color: var(--text-primary);
        }

        /* Compatibility list */
        .pd-compat-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .pd-compat-list li {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: rgba(34, 197, 94, 0.06);
            border: 1px solid rgba(34, 197, 94, 0.15);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .pd-compat-list li .check { color: var(--success); font-size: 1.1rem; }

        /* Downloads */
        .pd-downloads {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .pd-download-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            transition: all 0.3s;
        }

        .pd-download-item:hover {
            border-color: var(--accent-violet);
            background: var(--bg-card-hover);
        }

        .pd-download-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .pd-download-info .icon { font-size: 1.5rem; }

        .pd-download-info .details h4 {
            color: var(--text-primary);
            font-size: 0.95rem;
            margin-bottom: 2px;
        }

        .pd-download-info .details span {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .pd-download-btn {
            padding: 8px 18px;
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .pd-download-btn:hover {
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
            transform: translateY(-1px);
        }

        /* Shipping & Returns tab */
        .pd-shipping-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .pd-shipping-block {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .pd-shipping-block .icon {
            font-size: 1.6rem;
            min-width: 40px;
            text-align: center;
        }

        .pd-shipping-block h4 {
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .pd-shipping-block p {
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 0.95rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .pd-main {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .pd-title { font-size: 1.5rem; }
            .pd-price { font-size: 2rem; }

            .pd-info-badges {
                grid-template-columns: 1fr;
            }

            .pd-tabs-nav {
                gap: 0;
            }

            .pd-tab-btn {
                padding: 12px 16px;
                font-size: 0.85rem;
            }

            .pd-specs-table td:first-child {
                width: 140px;
            }
        }

        /* ============================================
           LIGHTBOX
           ============================================ */
        .lightbox-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: lb-fade-in 0.2s ease;
        }
        @keyframes lb-fade-in {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        .lightbox-img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
            animation: lb-scale-in 0.2s ease;
            display: block;
        }
        @keyframes lb-scale-in {
            from { transform: scale(0.93); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }
        .lightbox-close {
            position: fixed;
            top: 20px;
            right: 28px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 1.6rem;
            line-height: 1;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            z-index: 10001;
        }
        .lightbox-close:hover { background: rgba(255,255,255,0.25); }
        .lightbox-arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 1.8rem;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            z-index: 10001;
        }
        .lightbox-arrow:hover { background: rgba(255,255,255,0.25); }
        .lightbox-arrow.prev { left: 20px; }
        .lightbox-arrow.next { right: 20px; }
        .lightbox-counter {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
            letter-spacing: 0.05em;
        }
        .lightbox-thumbs {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10001;
        }
        .lightbox-thumb-dot {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s, opacity 0.2s;
            opacity: 0.5;
        }
        .lightbox-thumb-dot.active {
            border-color: var(--accent-violet);
            opacity: 1;
        }
        .lightbox-thumb-dot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* Make gallery main image show pointer */
        .pd-gallery-main img {
            cursor: zoom-in;
        }

        /* ============================================
           ADMIN / LOGIN
           ============================================ */
        .admin-login {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            border: 2px solid var(--border-glow);
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .login-card h2 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-card .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .login-card .error-msg {
            color: var(--danger);
            font-size: 0.9rem;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 10px;
        }

        .admin-form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .admin-form-group label {
            display: block;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .admin-input {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .admin-input:focus {
            outline: none;
            border-color: var(--accent-violet);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.2);
        }

        .admin-input::placeholder { color: var(--text-muted); }

        .admin-textarea {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.95rem;
            resize: vertical;
            min-height: 100px;
            font-family: var(--font-family);
            transition: all 0.3s;
        }

        .admin-textarea:focus {
            outline: none;
            border-color: var(--accent-violet);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.2);
        }

        .admin-select {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s;
            appearance: none;
            cursor: pointer;
        }

        .admin-select:focus {
            outline: none;
            border-color: var(--accent-violet);
        }

        /* Admin Panel */
        .admin-panel {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .admin-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .admin-header-actions {
            display: flex;
            gap: 12px;
        }

        /* Admin tabs */
        .admin-tabs {
            display: flex;
            gap: 4px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 28px;
        }
        .admin-tab {
            padding: 12px 24px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-family: var(--font-family);
            font-size: 0.95rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: color 0.2s, border-color 0.2s;
        }
        .admin-tab:hover { color: var(--text-primary); }
        .admin-tab.active {
            color: var(--accent-violet);
            border-bottom-color: var(--accent-violet);
        }

        /* Nav editor */
        .nav-editor { display: flex; flex-direction: column; gap: 12px; }
        .nav-item-row {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            overflow: hidden;
        }
        .nav-item-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
        }
        .nav-item-header .drag-handle {
            color: var(--text-muted);
            font-size: 1.1rem;
            cursor: grab;
            user-select: none;
        }
        .nav-item-header .nav-label {
            flex: 1;
            font-weight: 500;
            color: var(--text-primary);
        }
        .nav-item-header .nav-page-tag {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: rgba(255,255,255,0.06);
            padding: 3px 8px;
            border-radius: 4px;
        }
        .nav-item-header .nav-actions { display: flex; gap: 6px; }
        .nav-submenu-section {
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 12px 16px 16px 40px;
            background: rgba(0,0,0,0.15);
        }
        .nav-submenu-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .nav-sub-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            padding: 8px 12px;
        }
        .nav-sub-row .nav-label { flex: 1; font-size: 0.9rem; }
        .nav-sub-row .nav-page-tag { font-size: 0.72rem; }
        .nav-inline-form {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .nav-inline-form input, .nav-inline-form select {
            flex: 1;
            min-width: 120px;
            background: var(--bg-secondary);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 8px;
            font-family: var(--font-family);
            font-size: 0.85rem;
        }
        .nav-inline-form input:focus, .nav-inline-form select:focus {
            outline: none;
            border-color: var(--accent-violet);
        }
        .nav-add-top {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            padding: 16px;
            background: var(--bg-card);
            border: 1px dashed rgba(139,92,246,0.3);
            border-radius: 10px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .nav-add-top label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 4px;
        }
        .nav-add-top .field { display: flex; flex-direction: column; flex: 1; min-width: 130px; }

        .admin-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }

        .admin-stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .admin-stat-card .number {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent-cyan);
        }

        .admin-stat-card .label {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 4px;
        }

        /* Admin product list */
        .admin-products-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .admin-product-row {
            display: grid;
            grid-template-columns: 70px 1fr 100px 120px 100px;
            gap: 16px;
            align-items: center;
            padding: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 14px;
            transition: all 0.3s;
        }

        .admin-product-row:hover {
            border-color: var(--accent-violet);
        }

        .admin-product-row img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 10px;
        }

        .admin-product-row .name {
            font-weight: 700;
            color: var(--text-primary);
        }

        .admin-product-row .category {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .admin-product-row .price {
            font-weight: 700;
            color: var(--accent-cyan);
        }

        .admin-product-row .badge-col {
            font-size: 0.85rem;
        }

        .admin-product-row .actions {
            display: flex;
            gap: 8px;
        }

        .admin-btn-sm {
            padding: 8px 12px;
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .admin-btn-sm:hover {
            border-color: var(--accent-violet);
            color: var(--text-primary);
        }

        .admin-btn-sm.danger:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        /* Add Product Form */
        .admin-form-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .admin-form-card h3 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-glow);
        }

        .admin-form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .admin-form-row.three-col {
            grid-template-columns: 1fr 1fr 1fr;
        }

        .admin-color-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .admin-color-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .admin-color-chip .swatch {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .admin-color-chip .remove {
            cursor: pointer;
            color: var(--danger);
            margin-left: 4px;
            font-weight: bold;
        }

        .admin-list-input {
            display: flex;
            gap: 8px;
        }

        .admin-list-input .admin-input { flex: 1; }

        .admin-list-items {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 10px;
        }

        .admin-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border-radius: 10px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .admin-list-item .remove {
            cursor: pointer;
            color: var(--danger);
            font-weight: bold;
        }

        .admin-success-msg {
            padding: 16px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 12px;
            color: var(--success);
            text-align: center;
            font-weight: 600;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {

        function normalizePath(p) {
            if (!p) return p;
            // Converti backslash in slash
            let s = p.replace(/\\/g, '/');
            // Rimuovi prefisso assoluto Windows fino alla cartella progetto
            // Es: C:/Users/fmx/Desktop/ecommerce-react/products/... → products/...
            const projMatch = s.match(/[A-Za-z]:\/.*?ecommerce[^/]*\/(.*)/i);
            if (projMatch) return projMatch[1];
            // Fallback: estrai dalla prima occorrenza di "products/"
            const prodMatch = s.match(/(products\/.+)/i);
            if (prodMatch) return prodMatch[1];
            // Se inizia con lettera di unità senza pattern noto, restituisci convertito
            return s;
        }

        // ============================================
        // LIGHTBOX COMPONENT
        // ============================================
        function Lightbox({ images, startIndex, onClose }) {
            const [current, setCurrent] = React.useState(startIndex || 0);

            const prev = (e) => {
                e && e.stopPropagation();
                setCurrent(c => (c - 1 + images.length) % images.length);
            };
            const next = (e) => {
                e && e.stopPropagation();
                setCurrent(c => (c + 1) % images.length);
            };

            React.useEffect(() => {
                const handleKey = (e) => {
                    if (e.key === 'Escape')      onClose();
                    if (e.key === 'ArrowLeft')   prev();
                    if (e.key === 'ArrowRight')  next();
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, []);

            return (

        // ============================================
        const PAGE_OPTIONS = [
            { value: 'home',     label: '🏠 Home' },
            { value: 'products', label: '🛍️ Prodotti' },
            { value: 'cart',     label: '🛒 Carrello' },
            { value: 'wishlist', label: '❤️ Wishlist' },
            { value: 'info',     label: 'ℹ️ Info' },
        ];

        function NavEditor({ navItems, onSave }) {
            const [items, setItems] = React.useState(navItems);
            const [expandedId, setExpandedId] = React.useState(null);
            const [editingItem, setEditingItem] = React.useState(null);  // { id, label, page, isNew, parentId }
            const [newTop, setNewTop] = React.useState({ label: '', page: 'home' });
            const [newSub, setNewSub] = React.useState({});            // { [parentId]: { label, page } }
            const [saved, setSaved] = React.useState(false);

            const nextId = () => Date.now() + Math.random();

            // Move item up/down
            const moveItem = (index, dir, parentId) => {
                const updated = items.map(item => {
                    if (parentId && item.id === parentId) {
                        const subs = [...item.submenu];
                        const newIdx = index + dir;
                        if (newIdx < 0 || newIdx >= subs.length) return item;
                        [subs[index], subs[newIdx]] = [subs[newIdx], subs[index]];
                        return { ...item, submenu: subs };
                    }
                    return item;
                });
                if (!parentId) {
                    const arr = [...updated];
                    const newIdx = index + dir;
                    if (newIdx < 0 || newIdx >= arr.length) return;
                    [arr[index], arr[newIdx]] = [arr[newIdx], arr[index]];
                    setItems(arr);
                } else {
                    setItems(updated);
                }
            };

            // Delete top-level or sub
            const deleteItem = (id, parentId) => {
                if (!confirm('Eliminare questa voce?')) return;
                if (parentId) {
                    setItems(items.map(it => it.id === parentId
                        ? { ...it, submenu: it.submenu.filter(s => s.id !== id) }
                        : it
                    ));
                } else {
                    setItems(items.filter(it => it.id !== id));
                }
            };

            // Add top-level item
            const addTopItem = () => {
                if (!newTop.label.trim()) return;
                setItems([...items, { id: nextId(), label: newTop.label.trim(), page: newTop.page, submenu: [] }]);
                setNewTop({ label: '', page: 'home' });
            };

            // Add sub item
            const addSubItem = (parentId) => {
                const s = newSub[parentId] || { label: '', page: 'products' };
                if (!s.label.trim()) return;
                setItems(items.map(it => it.id === parentId
                    ? { ...it, submenu: [...(it.submenu || []), { id: nextId(), label: s.label.trim(), page: s.page }] }
                    : it
                ));
                setNewSub({ ...newSub, [parentId]: { label: '', page: 'products' } });
            };

            // Start inline edit
            const startEdit = (item, parentId) => {
                setEditingItem({ id: item.id, label: item.label, page: item.page, parentId: parentId || null });
            };

            // Confirm edit
            const confirmEdit = () => {
                const { id, label, page, parentId } = editingItem;
                if (parentId) {
                    setItems(items.map(it => it.id === parentId
                        ? { ...it, submenu: it.submenu.map(s => s.id === id ? { ...s, label, page } : s) }
                        : it
                    ));
                } else {
                    setItems(items.map(it => it.id === id ? { ...it, label, page } : it));
                }
                setEditingItem(null);
            };

            // Save all
            const handleSave = () => {
                onSave(items);
                setSaved(true);
                setTimeout(() => setSaved(false), 2500);
            };

            return (
                <div>
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px'}}>
                        <h2 style={{fontSize:'1.1rem', color:'var(--text-primary)'}}>🧭 Voci di Navigazione</h2>
                        <button className="btn btn-primary" style={{padding:'10px 24px'}} onClick={handleSave}>
                            {saved ? '✅ Salvato!' : '💾 Salva Navigazione'}
                        </button>
                    </div>

                    <div className="nav-editor">
                        {items.map((item, idx) => {
                            const isEditing = editingItem && editingItem.id === item.id && !editingItem.parentId;
                            return (
                                <div key={item.id} className="nav-item-row">
                                    <div className="nav-item-header">
                                        <span className="drag-handle">⠿</span>
                                        {isEditing ? (
                                            <div className="nav-inline-form" style={{flex:1}}>
                                                <input value={editingItem.label} placeholder="Testo voce"
                                                    onChange={e => setEditingItem({...editingItem, label: e.target.value})} />
                                                <select value={editingItem.page} onChange={e => setEditingItem({...editingItem, page: e.target.value})}>
                                                    {PAGE_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                                                    <option value="_custom">Personalizzata…</option>
                                                </select>
                                                {editingItem.page === '_custom' && (
                                                    <input value={editingItem.customPage || ''} placeholder="slug-pagina"
                                                        onChange={e => setEditingItem({...editingItem, page: e.target.value})} />
                                                )}
                                                <button className="admin-btn-sm" onClick={confirmEdit}>✓</button>
                                                <button className="admin-btn-sm" onClick={() => setEditingItem(null)}>✕</button>
                                            </div>
                                        ) : (
                                            <>
                                                <span className="nav-label">{item.label}</span>
                                                <span className="nav-page-tag">{item.page}</span>
                                                <div className="nav-actions">
                                                    <button className="admin-btn-sm" title="Su" onClick={() => moveItem(idx, -1, null)} disabled={idx===0}>↑</button>
                                                    <button className="admin-btn-sm" title="Giù" onClick={() => moveItem(idx, 1, null)} disabled={idx===items.length-1}>↓</button>
                                                    <button className="admin-btn-sm" title="Modifica" onClick={() => startEdit(item, null)}>✏️</button>
                                                    <button className="admin-btn-sm" title={expandedId===item.id ? 'Chiudi sottomenu' : 'Gestisci sottomenu'}
                                                        onClick={() => setExpandedId(expandedId===item.id ? null : item.id)}>
                                                        {item.submenu && item.submenu.length > 0 ? `📂 ${item.submenu.length}` : '📂'}
                                                    </button>
                                                    <button className="admin-btn-sm danger" title="Elimina" onClick={() => deleteItem(item.id, null)}>🗑</button>
                                                </div>
                                            </>
                                        )}
                                    </div>

                                    {expandedId === item.id && (
                                        <div className="nav-submenu-section">
                                            <div style={{fontSize:'0.8rem', color:'var(--text-muted)', marginBottom:'8px'}}>Sottovoci</div>
                                            <div className="nav-submenu-list">
                                                {(item.submenu || []).map((sub, sIdx) => {
                                                    const isEditingSub = editingItem && editingItem.id === sub.id && editingItem.parentId === item.id;
                                                    return (
                                                        <div key={sub.id} className="nav-sub-row">
                                                            {isEditingSub ? (
                                                                <div className="nav-inline-form" style={{flex:1}}>
                                                                    <input value={editingItem.label} placeholder="Testo"
                                                                        onChange={e => setEditingItem({...editingItem, label: e.target.value})} />
                                                                    <select value={editingItem.page} onChange={e => setEditingItem({...editingItem, page: e.target.value})}>
                                                                        {PAGE_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                                                                        <option value="_custom">Personalizzata…</option>
                                                                    </select>
                                                                    <button className="admin-btn-sm" onClick={confirmEdit}>✓</button>
                                                                    <button className="admin-btn-sm" onClick={() => setEditingItem(null)}>✕</button>
                                                                </div>
                                                            ) : (
                                                                <>
                                                                    <span className="nav-label">{sub.label}</span>
                                                                    <span className="nav-page-tag">{sub.page}</span>
                                                                    <div className="nav-actions">
                                                                        <button className="admin-btn-sm" onClick={() => moveItem(sIdx, -1, item.id)} disabled={sIdx===0}>↑</button>
                                                                        <button className="admin-btn-sm" onClick={() => moveItem(sIdx, 1, item.id)} disabled={sIdx===(item.submenu.length-1)}>↓</button>
                                                                        <button className="admin-btn-sm" onClick={() => startEdit(sub, item.id)}>✏️</button>
                                                                        <button className="admin-btn-sm danger" onClick={() => deleteItem(sub.id, item.id)}>🗑</button>
                                                                    </div>
                                                                </>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                            {/* Add sub form */}
                                            <div className="nav-inline-form">
                                                <input
                                                    value={(newSub[item.id] || {}).label || ''}
                                                    placeholder="+ Nuova sottovoce"
                                                    onChange={e => setNewSub({...newSub, [item.id]: {...(newSub[item.id]||{label:'',page:'products'}), label: e.target.value}})}
                                                    onKeyDown={e => e.key === 'Enter' && addSubItem(item.id)}
                                                />
                                                <select
                                                    value={(newSub[item.id] || {}).page || 'products'}
                                                    onChange={e => setNewSub({...newSub, [item.id]: {...(newSub[item.id]||{label:'',page:'products'}), page: e.target.value}})}
                                                >
                                                    {PAGE_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                                                </select>
                                                <button className="admin-btn-sm" onClick={() => addSubItem(item.id)}>➕ Aggiungi</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    {/* Add top-level item */}
                    <div className="nav-add-top" style={{marginTop:'16px'}}>
                        <div className="field">
                            <label>Nuova voce principale</label>
                            <input
                                className="admin-input"
                                value={newTop.label}
                                placeholder="Es. 🔧 Servizi"
                                onChange={e => setNewTop({...newTop, label: e.target.value})}
                                onKeyDown={e => e.key === 'Enter' && addTopItem()}
                                style={{padding:'10px 14px'}}
                            />
                        </div>
                        <div className="field">
                            <label>Pagina di destinazione</label>
                            <select
                                className="admin-input"
                                value={newTop.page}
                                onChange={e => setNewTop({...newTop, page: e.target.value})}
                                style={{padding:'10px 14px'}}
                            >
                                {PAGE_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                            </select>
                        </div>
                        <button className="btn btn-primary" style={{marginTop:'22px', padding:'10px 22px', whiteSpace:'nowrap'}} onClick={addTopItem}>
                            ➕ Aggiungi Voce
                        </button>
                    </div>
                </div>
            );
        }

            const [form, setForm] = React.useState(editProduct ? {

                price: String(editProduct.price || ''),

            const [success, setSuccess] = React.useState('');

            // Temp inputs for list items
            const [specLabel, setSpecLabel] = React.useState('');

            const [compatItem, setCompatItem] = React.useState('');

            const [colorExtra, setColorExtra] = React.useState('0');

            const addCompat = () => {

        // ============================================
        // ADMIN PANEL COMPONENT
        // ============================================
        function AdminPanel({ onLogout, allProducts, onSaveProduct, onDeleteProduct, navItems, onSaveNavItems }) {
            const [tab, setTab] = React.useState('products');  // products | navigation
            const [view, setView] = React.useState('list'); // list | add | edit
            const [editProduct, setEditProduct] = React.useState(null);

            const handleEdit = (product) => {
                setEditProduct(product);
                setView('edit');
            };

            const handleSave = (product) => {
                onSaveProduct(product);
                setView('list');
                setEditProduct(null);
            };

            const handleDelete = (id) => {
                if (confirm('Sei sicuro di voler eliminare questo prodotto?')) {
                    onDeleteProduct(id);
                }
            };

            const categoryCounts = {};
            allProducts.forEach(p => {
                categoryCounts[p.category] = (categoryCounts[p.category] || 0) + 1;
            });

            return (
                <div className="page active">
                    <div className="admin-panel">
                        {/* Header */}
                        <div className="admin-header">
                            <h1>⚙️ Pannello Admin</h1>
                            <div className="admin-header-actions">
                                {tab === 'products' && view !== 'list' && (
                                    <button className="btn btn-secondary" onClick={() => { setView('list'); setEditProduct(null); }} style={{padding:'12px 20px'}}>
                                        ← Lista Prodotti
                                    </button>
                                )}
                                {tab === 'products' && view === 'list' && (
                                    <button className="btn btn-primary" onClick={() => setView('add')} style={{padding:'12px 24px'}}>
                                        ➕ Nuovo Prodotto
                                    </button>
                                )}
                                <button className="admin-btn-sm danger" onClick={onLogout}>🚪 Logout</button>
                            </div>
                        </div>

                        {/* Tabs */}
                        <div className="admin-tabs">
                            <button className={`admin-tab ${tab === 'products' ? 'active' : ''}`} onClick={() => { setTab('products'); setView('list'); }}>
                                🛍️ Prodotti
                            </button>
                            <button className={`admin-tab ${tab === 'navigation' ? 'active' : ''}`} onClick={() => setTab('navigation')}>
                                🧭 Navigazione
                            </button>
                        </div>

                        {/* TAB: PRODUCTS */}
                        {tab === 'products' && (
                            <>
                                {view === 'list' && (
                                    <>
                                        <div className="admin-stats">
                                            <div className="admin-stat-card">
                                                <div className="number">{allProducts.length}</div>
                                                <div className="label">Prodotti totali</div>
                                            </div>
                                            <div className="admin-stat-card">
                                                <div className="number">{Object.keys(categoryCounts).length}</div>
                                                <div className="label">Categorie</div>
                                            </div>
                                            <div className="admin-stat-card">
                                                <div className="number">{allProducts.filter(p => p.badge === 'New').length}</div>
                                                <div className="label">Nuovi</div>
                                            </div>
                                            <div className="admin-stat-card">
                                                <div className="number">{allProducts.filter(p => p.oldPrice).length}</div>
                                                <div className="label">In offerta</div>
                                            </div>
                                        </div>

                                        <div className="admin-products-list">
                                            {allProducts.map(p => (
                                                <div key={p.id} className="admin-product-row">
                                                    <img src={normalizePath(p.image)} alt={p.name} />
                                                    <div>
                                                        <div className="name">{p.name}</div>
                                                        <div className="category">{p.category || '—'}</div>
                                                    </div>
                                                    <div className="price">€{p.price}</div>
                                                    <div className="badge-col">{p.badge || '—'}</div>
                                                    <div className="actions">
                                                        <button className="admin-btn-sm" onClick={() => handleEdit(p)}>✏️</button>
                                                        <button className="admin-btn-sm danger" onClick={() => handleDelete(p.id)}>🗑️</button>
                                                    </div>
                                                </div>
                                            ))}
                                            {allProducts.length === 0 && (
                                                <div style={{textAlign:'center', padding:'40px', color:'var(--text-muted)'}}>
                                                    Nessun prodotto. Clicca "Nuovo Prodotto" per iniziare.
                                                </div>
                                            )}
                                        </div>
                                    </>
                                )}

                                {view === 'add' && (
                                    <AddProductForm onSave={handleSave} onCancel={() => setView('list')} />
                                )}

                                {view === 'edit' && editProduct && (
                                    <AddProductForm onSave={handleSave} onCancel={() => { setView('list'); setEditProduct(null); }} editProduct={editProduct} />
                                )}
                            </>
                        )}

                        {/* TAB: NAVIGATION */}
                        {tab === 'navigation' && (
                            <NavEditor navItems={navItems} onSave={onSaveNavItems} />
                        )}
                    </div>
                </div>
            );
        }
