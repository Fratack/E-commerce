<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 132" font-family="'Courier New', Courier, monospace">
  <!-- Frame a chip: rettangolo con angolo top-right tagliato -->
  <polygon
    points="14,10 176,10 206,40 206,122 14,122"
    fill="none"
    stroke="#111111"
    stroke-width="5"
    stroke-linejoin="miter"/>
  <!-- Linea notch cyan -->
  <line x1="176" y1="10" x2="206" y2="40" stroke="#00CFCF" stroke-width="5" stroke-linecap="round"/>
  <!-- PEG -->
  <text x="110" y="70" text-anchor="middle"
    font-size="42" font-weight="700" fill="#111111" letter-spacing="8">PEG</text>
  <!-- Separatore cyan -->
  <line x1="30" y1="82" x2="190" y2="82" stroke="#00CFCF" stroke-width="3"/>
  <!-- LAB -->
  <text x="110" y="114" text-anchor="middle"
    font-size="42" font-weight="700" fill="#111111" letter-spacing="8">LAB</text>
</svg>
