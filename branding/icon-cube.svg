<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gc-top" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gc-left" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>

  <!-- Faccia superiore (più chiara — luce dall'alto) -->
  <polygon points="50,6 92,28 50,50 8,28" fill="url(#gc-top)"/>

  <!-- Faccia sinistra (media) -->
  <polygon points="8,28 50,50 50,94 8,72" fill="url(#gc-left)"/>

  <!-- Faccia destra (scura — ombra) -->
  <polygon points="92,28 50,50 50,94 92,72" fill="#0e0e1a"/>

  <!-- Spigoli bianchi sottili per definizione -->
  <polyline points="50,6 92,28 50,50 8,28 50,6"
    fill="none" stroke="white" stroke-width="1.5" stroke-linejoin="round" opacity="0.6"/>
  <line x1="50" y1="50" x2="50" y2="94" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="8"  y1="72" x2="50" y2="94" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="92" y1="72" x2="50" y2="94" stroke="white" stroke-width="1.5" opacity="0.6"/>
</svg>
