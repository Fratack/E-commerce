<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- ICON MARK: Stylized "A" inside hexagon - geometric, 3D-printable -->
  <!-- Outer hexagon -->
  <polygon points="80,12 143,12 174.5,56 174.5,112 143,156 80,156 48.5,112 48.5,56"
           fill="none" stroke="url(#grad1)" stroke-width="5" stroke-linejoin="round"/>

  <!-- Inner geometric "A" shape - stylized with circuit/tech feel -->
  <!-- Left leg -->
  <line x1="82" y1="130" x2="111.5" y2="40" stroke="url(#grad1)" stroke-width="6" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="141" y1="130" x2="111.5" y2="40" stroke="url(#grad1)" stroke-width="6" stroke-linecap="round"/>
  <!-- Crossbar -->
  <line x1="90" y1="95" x2="133" y2="95" stroke="url(#grad2)" stroke-width="5" stroke-linecap="round"/>

  <!-- Circuit nodes (dots at key intersections) -->
  <circle cx="111.5" cy="40" r="5" fill="url(#grad2)"/>
  <circle cx="90" cy="95" r="4" fill="url(#grad2)"/>
  <circle cx="133" cy="95" r="4" fill="url(#grad2)"/>
  <circle cx="82" cy="130" r="4" fill="#3b82f6"/>
  <circle cx="141" cy="130" r="4" fill="#a855f7"/>

  <!-- WORDMARK -->
  <text x="200" y="105" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="62" font-weight="800" letter-spacing="-1" fill="url(#grad1)">
    AITYCONS
  </text>

  <!-- Tagline -->
  <text x="200" y="140" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="16" font-weight="500" fill="#94a3b8"
        textLength="351" lengthAdjust="spacing">
    TECH &amp; AUTOMATION LAB
  </text>
</svg>