<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" width="200" height="180">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer hexagon -->
  <polygon points="100,6 170,6 205,56 205,124 170,174 100,174 65,124 65,56"
           fill="none" stroke="url(#g1)" stroke-width="6" stroke-linejoin="round"/>

  <!-- Stylized "A" -->
  <line x1="101" y1="145" x2="135" y2="40" stroke="url(#g1)" stroke-width="7" stroke-linecap="round"/>
  <line x1="169" y1="145" x2="135" y2="40" stroke="url(#g1)" stroke-width="7" stroke-linecap="round"/>
  <line x1="112" y1="105" x2="158" y2="105" stroke="url(#g2)" stroke-width="6" stroke-linecap="round"/>

  <!-- Circuit nodes -->
  <circle cx="135" cy="40" r="6" fill="url(#g2)"/>
  <circle cx="112" cy="105" r="5" fill="url(#g2)"/>
  <circle cx="158" cy="105" r="5" fill="url(#g2)"/>
  <circle cx="101" cy="145" r="5" fill="#3b82f6"/>
  <circle cx="169" cy="145" r="5" fill="#a855f7"/>
</svg>