<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <!-- MONOCHROME WHITE VERSION - for dark backgrounds, laser engraving, stickers -->

  <!-- Outer hexagon -->
  <polygon points="80,12 143,12 174.5,56 174.5,112 143,156 80,156 48.5,112 48.5,56"
           fill="none" stroke="#ffffff" stroke-width="5" stroke-linejoin="round"/>

  <!-- Inner geometric "A" shape -->
  <line x1="82" y1="130" x2="111.5" y2="40" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  <line x1="141" y1="130" x2="111.5" y2="40" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  <line x1="90" y1="95" x2="133" y2="95" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>

  <!-- Circuit nodes -->
  <circle cx="111.5" cy="40" r="5" fill="#ffffff"/>
  <circle cx="90" cy="95" r="4" fill="#ffffff"/>
  <circle cx="133" cy="95" r="4" fill="#ffffff"/>
  <circle cx="82" cy="130" r="4" fill="#ffffff"/>
  <circle cx="141" cy="130" r="4" fill="#ffffff"/>

  <!-- WORDMARK -->
  <text x="200" y="105" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="62" font-weight="800" letter-spacing="-1" fill="#ffffff">
    AITYCONS
  </text>

  <text x="200" y="140" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="16" font-weight="500" fill="#94a3b8"
        textLength="351" lengthAdjust="spacing">
    TECH &amp; AUTOMATION LAB
  </text>
</svg>